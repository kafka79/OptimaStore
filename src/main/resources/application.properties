spring.application.name=inventory-app
server.port=8080

# Set server.ssl.enabled=true and provide keystore to enforce HTTPS
# Example:
# server.ssl.enabled=false
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=changeit
# server.ssl.key-store-type=PKCS12
server.ssl.enabled=false

spring.datasource.url=jdbc:h2:file:./data/inventory;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

inventory.default-low-stock-threshold=5
spring.flyway.baseline-on-migrate=true
auth.password=${AUTH_PASSWORD}

outbox.scheduler.delay=60000
