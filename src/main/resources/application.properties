spring.application.name=inventory-app
server.port=8080

# Set server.ssl.enabled=true and provide keystore to enforce HTTPS
# Example:
# server.ssl.enabled=false
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=changeit
# server.ssl.key-store-type=PKCS12
server.ssl.enabled=false

spring.datasource.url=jdbc:h2:file:./data/inventory;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

inventory.default-low-stock-threshold=5

# Auth — MUST be overridden in production
auth.username=${AUTH_USERNAME:admin}
auth.password=${AUTH_PASSWORD:devpass}

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=true

# Outbox
outbox.scheduler.delay=60000

# Kafka producer retry for resilience
spring.kafka.producer.retries=3
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.request.timeout.ms=5000
spring.kafka.producer.properties.max.block.ms=3000
spring.kafka.producer.properties.delivery.timeout.ms=10000
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# SSL — enable in production with a valid keystore
# server.ssl.enabled=true
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=${KEYSTORE_PASSWORD}
# server.ssl.key-store-type=PKCS12
