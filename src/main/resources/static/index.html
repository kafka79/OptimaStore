<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inventory</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="header">
    <h1>Inventory</h1>
    <p class="subtitle">Stock levels, adjustments, and reports (Java + JDBC backend)</p>
  </header>

  <main class="layout">
    <section class="card" aria-labelledby="add-heading">
      <h2 id="add-heading">Add item</h2>
      <form id="add-form" class="form-grid">
        <label>SKU <input name="sku" required maxlength="64" autocomplete="off" /></label>
        <label>Name <input name="name" required maxlength="255" /></label>
        <label>Quantity <input name="quantity" type="number" min="0" value="0" required /></label>
        <label>Unit price <input name="unitPrice" type="number" min="0" step="0.01" value="0" required /></label>
        <label>Category <input name="category" maxlength="128" value="General" /></label>
        <div class="form-actions">
          <button type="submit">Add to inventory</button>
        </div>
      </form>
      <p id="form-message" class="message" role="status"></p>
    </section>

    <section class="card" aria-labelledby="report-heading">
      <h2 id="report-heading">Report</h2>
      <div class="report-controls">
        <label>Low-stock threshold
          <input id="threshold" type="number" min="0" value="5" />
        </label>
        <button type="button" id="refresh-report">Refresh report</button>
        <button type="button" id="export-csv">Download CSV</button>
      </div>
      <dl class="report-stats" id="report-stats"></dl>
      <h3 class="report-sub">Low-stock items</h3>
      <div class="table-wrap">
        <table id="low-stock-table">
          <thead>
            <tr>
              <th>SKU</th>
              <th>Name</th>
              <th>Qty</th>
              <th>Unit</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="card full-width" aria-labelledby="list-heading">
      <div class="table-header-controls">
        <h2 id="list-heading" style="margin: 0;">All items</h2>
        <div class="table-controls">
          <input type="text" id="search-input" placeholder="Search SKU or Name..." autocomplete="off" />
          <select id="category-filter">
            <option value="all">All Categories</option>
            <option value="General">General</option>
            <option value="Fruit">Fruit</option>
            <option value="Electronics">Electronics</option>
            <option value="Groceries">Groceries</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table id="items-table">
          <thead>
            <tr>
              <th>SKU</th>
              <th>Name</th>
              <th>Qty</th>
              <th>Unit</th>
              <th>Category</th>
              <th>Adjust</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination-controls">
        <button type="button" class="secondary" id="prev-page" disabled>Previous</button>
        <span id="page-info">Page 1 of 1</span>
        <button type="button" class="secondary" id="next-page" disabled>Next</button>
      </div>
    </section>
  </main>

  <!-- Custom Confirm Modal -->
  <div id="confirm-modal" class="modal-overlay" aria-hidden="true" role="dialog">
    <div class="modal-content">
      <h3 id="modal-title">Confirm Action</h3>
      <p id="modal-message">Are you sure you want to proceed?</p>
      <div class="modal-actions">
        <button type="button" class="secondary" id="modal-cancel">Cancel</button>
        <button type="button" class="danger" id="modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
