<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inventory</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="header">
    <h1>Inventory</h1>
    <p class="subtitle">Stock levels, adjustments, and reports (Java + JDBC backend)</p>
  </header>

  <main class="layout">
    <section class="card" aria-labelledby="add-heading">
      <h2 id="add-heading">Add item</h2>
      <form id="add-form" class="form-grid">
        <div class="form-field">
          <label for="input-sku">SKU</label>
          <input id="input-sku" name="sku" required maxlength="64" autocomplete="off" />
        </div>
        <div class="form-field">
          <label for="input-name">Name</label>
          <input id="input-name" name="name" required maxlength="255" />
        </div>
        <div class="form-field">
          <label for="input-quantity">Quantity</label>
          <input id="input-quantity" name="quantity" type="number" min="0" value="0" required />
        </div>
        <div class="form-field">
          <label for="input-unitPrice">Unit price</label>
          <input id="input-unitPrice" name="unitPrice" type="number" min="0" step="0.01" value="0" required />
        </div>
        <div class="form-field">
          <label for="input-category">Category</label>
          <input id="input-category" name="category" maxlength="128" value="General" />
        </div>
        <div class="form-actions">
          <button type="submit">Add to inventory</button>
        </div>
      </form>
      <p id="form-message" class="message" role="status"></p>
    </section>

    <section class="card" aria-labelledby="report-heading">
      <h2 id="report-heading">Report</h2>
      <div class="report-controls">
        <div class="form-field inline-field">
          <label for="threshold">Low-stock threshold</label>
          <input id="threshold" type="number" min="0" value="5" />
        </div>
        <button type="button" id="refresh-report">Refresh report</button>
        <button type="button" id="export-csv">Download CSV</button>
      </div>
      <dl class="report-stats" id="report-stats"></dl>
      <h3 class="report-sub">Low-stock items</h3>
      <div class="table-wrap">
        <table id="low-stock-table">
          <thead>
            <tr>
              <th>SKU</th>
              <th>Name</th>
              <th>Qty</th>
              <th>Unit</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="card full-width" aria-labelledby="list-heading">
      <div class="table-header-controls">
        <h2 id="list-heading" style="margin: 0;">All items</h2>
        <div class="table-controls">
          <label for="search-input" class="sr-only">Search SKU or Name</label>
          <input type="text" id="search-input" placeholder="Search SKU or Name..." autocomplete="off" />
          
          <label for="category-filter" class="sr-only">Category Filter</label>
          <select id="category-filter">
            <option value="all">All Categories</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table id="items-table">
          <thead>
            <tr>
              <th>SKU</th>
              <th>Name</th>
              <th>Qty</th>
              <th>Unit</th>
              <th>Category</th>
              <th>Adjust</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination-controls">
        <button type="button" class="secondary" id="prev-page" disabled>Previous</button>
        <span id="page-info">Page 1 of 1</span>
        <button type="button" class="secondary" id="next-page" disabled>Next</button>
      </div>
    </section>
  </main>

  <!-- Custom Confirm Modal -->
  <div id="confirm-modal" class="modal-overlay" aria-hidden="true" role="dialog">
    <div class="modal-content">
      <h3 id="modal-title">Confirm Action</h3>
      <p id="modal-message">Are you sure you want to proceed?</p>
      <div class="modal-actions">
        <button type="button" class="secondary" id="modal-cancel">Cancel</button>
        <button type="button" class="danger" id="modal-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
